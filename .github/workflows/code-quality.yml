name: Code Quality Analysis

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch: # Allow manual trigger

jobs:
  fallow-analysis:
    name: Fallow Code Intelligence
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better analysis
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Fallow Analysis
        run: npm run fallow:all
        continue-on-error: true # Don't fail the build, just report
      
      - name: Run Dead Code Check
        run: npm run fallow:dead
        continue-on-error: true
      
      - name: Run Duplication Check
        run: npm run fallow:dupes
        continue-on-error: true
      
      - name: Run Health Check
        run: npm run fallow:health
        continue-on-error: true
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = `## 🔍 Fallow Code Quality Report
            
            The code quality analysis has completed. Please review the workflow logs for detailed findings.
            
            ### Quick Actions
            - Review dead code: \`npm run fallow:dead\`
            - Check duplicates: \`npm run fallow:dupes\`
            - View complexity: \`npm run fallow:health\`
            
            See \`FALLOW_GUIDE.md\` for more information.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Optional: Fail if too many issues found
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: fallow-analysis
    if: false # Set to true to enable quality gate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check Quality Thresholds
        run: |
          # This will fail the build if thresholds are exceeded
          npm run fallow -- --max-dead-code 100 --max-dupes 50 --max-complexity 200
